services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: kashif
      POSTGRES_USER: kashif
      POSTGRES_PASSWORD: kashif_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
